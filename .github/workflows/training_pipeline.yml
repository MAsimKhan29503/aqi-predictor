name: Training Pipeline (Daily)

on:
  schedule:
    # Runs every day at 2:00 AM UTC (7:00 AM Pakistan time)
    - cron: '0 2 * * *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-training-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Cache pip dependencies
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install confluent-kafka

      # Step 5: Run the training pipeline
      - name: Run Training Pipeline
        env:
          AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
        run: |
          python feature_pipeline/training_pipeline.py

      # Step 6: Notify on success
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Training pipeline completed successfully at $(date)"

      # Step 7: Notify on failure
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Training pipeline failed at $(date)"
          echo "Check the logs above for details"
